services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      PG_HOST: ${PG_HOST:-postgres}
      PG_PORT: ${PG_PORT:-5432}
      PG_USER: ${PG_USER:-uniasselvi}
      PG_PASSWORD: ${PG_PASSWORD:-uniasselvi}
      PG_DATABASE: ${PG_DATABASE:-uniasselvi_db}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-uniasselvi}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-300}
      CACHE_DEBUG: ${CACHE_DEBUG:-true}
      DB_DEBUG: ${DB_DEBUG:-true}
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  redis:
    image: redis:7.2
    command: redis-server --requirepass ${REDIS_PASSWORD:-uniasselvi}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-uniasselvi}", "ping"]
      start_period: 5s
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${PG_USER:-uniasselvi}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-uniasselvi}
      POSTGRES_DB: ${PG_DATABASE:-uniasselvi_db}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-uniasselvi}"]
      interval: 5s
      start_period: 5s

volumes:
  postgres_data:
  redis_data:

  